<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karol G - Fátima y Alma</title>
    <link rel="stylesheet" href="primer.css">
</head>
<!-- encabezado corregido y extendido by me el mero mero -->
<body>
    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <h1>KAROL G</h1>
            <p class="subtitle">La mera mera petatera</p>
            <div class="divider"></div>
            <p class="authors">Presentado por Fátima y Alma</p>
        </div>
    </header>

    
    <main class="container">

 <!-- Seccion donde se pego la direccion del instagram -->

        <section class="hero-section">
            <div class="image-wrapper">
                <img src="KAROLG.JPG" class="main-image" alt="Karol G">
            </div>
            <div class="social-link">
                <a href="https://www.instagram.com/accounts/login/?next=%2Fkarolg%2F&source=omni_redirect/" target="_blank" rel="noopener noreferrer">
                    Instagram Oficial
                </a>
            </div>
        </section>

        <div class="media-grid">
            <!-- Sección de Video -->
            <section class="media-section">
                <h2>Video</h2>
                <div class="media-wrapper">
                    <video src="karol.mp4" controls class="video-player">
                        Tu navegador no soporta el elemento de video.
                    </video>
                </div>
            </section>

            <!-- Sección de Audio -->
            <section class="media-section">
                <h2>Audio</h2>
                <div class="media-wrapper">
                    <audio src="karola.mp3" controls class="audio-player">
                        Tu navegador no soporta el elemento de audio.
                    </audio>
                </div>
            </section>
        </div>

        <!-- Sección de Galería de Conciertos -->
        <section class="gallery-section">
            <h2 class="section-title">Galería de Conciertos</h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="CONCIERTO.JPEG" alt="Concierto de Karol G">
                    <p class="gallery-caption">Concierto 1</p>
                </div>
                <div class="gallery-item">
                    <img src="concierto2.jpg" alt="Concierto de Karol G 2">
                    <p class="gallery-caption">Concierto 2</p>
                </div>
                <div class="gallery-item">
                    <img src="concierto3.jpg" alt="Concierto de Karol G 3">
                    <p class="gallery-caption">Concierto 3</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <p>Proyecto Escolar 2026 - Fátima y Alma</p>
    </footer>
</body>
</html>
