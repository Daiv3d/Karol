<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karol G - Fátima y Alma</title>
    <link rel="stylesheet" href="primer.css">
</head>
<body>
    
    <header class="main-header" id="top">
        <div class="header-content">
            <h1>KAROL G</h1>
            <p class="subtitle">La Bichota</p>
            <div class="divider"></div>
            <p class="authors">Presentado por Fátima y Alma</p>
        </div>
    </header>

    
    <main class="container">

        
        <section class="hero-section">
            <div class="image-wrapper">
                <img src="KAROLG.JPG" class="main-image" alt="Karol G">
            </div>
            <div class="social-link">
                <a href="https://www.instagram.com/accounts/login/?next=%2Fkarolg%2F&source=omni_redirect/" target="_blank" rel="noopener noreferrer">
                    Instagram Oficial
                </a>
            </div>
        </section>

        <div class="media-grid">
            
            <section class="media-section">
                <h2>Video</h2>
                <div class="media-wrapper">
                    <video src="karol.mp4" controls class="video-player">
                        Tu navegador no soporta el elemento de video.
                    </video>
                </div>
            </section>

            <!-- Sección de Audio -->
            <section class="media-section">
                <h2>Audio</h2>
                <div class="media-wrapper">
                    <audio src="karola.mp3" controls class="audio-player">
                        Tu navegador no soporta el elemento de audio.
                    </audio>
                </div>
            </section>
        </div>

       
        <section class="gallery-section">
            <h2 class="section-title">Galería de Conciertos</h2>
            <div class="gallery-grid">
                <div class="gallery-item" onclick="openLightbox('CONCIERTO.JPEG', 'Concierto 1')">
                    <img src="CONCIERTO.JPEG" alt="Concierto de Karol G">
                    <p class="gallery-caption">Concierto 1</p>
                </div>
                <div class="gallery-item" onclick="openLightbox('concierto2.jpg', 'Concierto 2')">
                    <img src="concierto2.jpg" alt="Concierto de Karol G 2">
                    <p class="gallery-caption">Concierto 2</p>
                </div>
                <div class="gallery-item" onclick="openLightbox('concierto3.jpg', 'Concierto 3')">
                    <img src="concierto3.jpg" alt="Concierto de Karol G 3">
                    <p class="gallery-caption">Concierto 3</p>
                </div>
            </div>
        </section>

    </main>


    <footer class="main-footer">
        <p>Proyecto Escolar 2026 - Fátima y Alma</p>
    </footer>

    
    <button class="scroll-to-top" id="scrollToTop" onclick="scrollToTop()">
        ↑
    </button>

    <
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">×</span>
        <img class="lightbox-content" id="lightboxImg" alt="">
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <script>
        // Función para abrir el lightbox
        function openLightbox(imgSrc, caption) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxCaption = document.getElementById('lightboxCaption');
            
            lightbox.classList.add('active');
            lightboxImg.src = imgSrc;
            lightboxCaption.textContent = caption;
        }

        // Función para cerrar el lightbox
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }

        // Función para scroll suave al inicio
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

       
        window.addEventListener('scroll', function() {
            const scrollBtn = document.getElementById('scrollToTop');
            if (window.pageYOffset > 300) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        });

    
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
